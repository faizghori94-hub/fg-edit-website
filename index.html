<!DOCTYPE html>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HERO */
.hero{
  text-align:center;
  padding-top:100px;
  color:white;
}

.hero img{
  width:180px;
  margin-bottom:20px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  margin-top:10px;
  font-size:18px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin:15px;
  padding:15px 30px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* SECTION */
.section{
  margin-top:150px;
  background:#0a0a0a;
  padding:50px 20px;
  text-align:center;
}

.section h2{
  color:white;
  margin-bottom:30px;
}

/* CARDS */
.card{
  display:inline-block;
  width:250px;
  margin:15px;
  padding:25px;
  background:#111;
  border-radius:15px;
  color:white;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}
</style>
</head>
